name: Windows Install Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'scripts/**'
      - 'electron-builder.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/windows-install-smoke.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  install-smoke:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binaries for Windows
        run: pnpm run uv:download:win

      - name: Build Windows package
        run: pnpm run package:win

      - name: Locate installer
        id: locate
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "MyClaw.One-*-win-*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            Get-ChildItem release | Format-Table Name, Length
            throw "installer .exe not found under release/"
          }
          Write-Host "Found installer: $($installer.FullName)"
          "installer=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Seed .openclaw canary (regression guard for default path)
        shell: pwsh
        run: |
          # A canary in $env:USERPROFILE\.openclaw lets us detect if the default
          # silent install/uninstall ever wipes user data (it must not).
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          $canary = Join-Path $openclaw "canary.txt"
          Set-Content -Path $canary -Value "canary-default-$(Get-Date -Format o)" -Encoding utf8
          Write-Host "Seeded canary: $canary"

      - name: Silent install
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          Write-Host "Installing: $installer"
          $p = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          Write-Host "Installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "installer returned non-zero exit code" }

      - name: Assert canary survived default silent install
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (-not (Test-Path $canary)) {
            throw "REGRESSION: default silent install wiped $canary — auto-updates must preserve user data"
          }
          Write-Host "OK: canary survived default silent install"

      - name: Verify install location
        id: install-path
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\MyClaw.One\MyClaw.One.exe",
            "C:\Program Files (x86)\MyClaw.One\MyClaw.One.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Expected install paths missing; listing Program Files:"
            Get-ChildItem "C:\Program Files" -Filter "MyClaw*" -ErrorAction SilentlyContinue | Format-Table
            throw "installed MyClaw.One.exe not found"
          }
          Write-Host "Installed exe: $exe"
          "exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $installDir = Split-Path $exe -Parent
          "dir=$installDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-ChildItem $installDir | Format-Table Name, Length

      - name: Launch installed app
        shell: pwsh
        run: |
          $exe = "${{ steps.install-path.outputs.exe }}"
          Start-Process -FilePath $exe -ArgumentList ''
          Start-Sleep -Seconds 5
          $procs = Get-Process -Name "MyClaw.One" -ErrorAction SilentlyContinue
          if (-not $procs) {
            throw "MyClaw.One process did not launch"
          }
          Write-Host "Process running; PID(s): $($procs.Id -join ', ')"

      - name: Wait for Gateway port 18789
        shell: pwsh
        run: |
          # First-run on Windows frequently takes ~2 min: a handshake timeout
          # after the initial Gateway process spawn forces a restart, and the
          # second spawn is the one that actually binds. 420s covers the
          # worst case we've observed on windows-latest.
          $totalWaitSec = 420
          $start = Get-Date
          $deadline = $start.AddSeconds($totalWaitSec)
          $found = $false
          while ((Get-Date) -lt $deadline) {
            $conn = Get-NetTCPConnection -LocalPort 18789 -State Listen -ErrorAction SilentlyContinue
            if ($conn) {
              $elapsed = [int]((Get-Date) - $start).TotalSeconds
              Write-Host "Gateway listening on 18789 (PID $($conn[0].OwningProcess)) after ${elapsed}s"
              $found = $true
              break
            }
            Start-Sleep -Seconds 3
          }
          if (-not $found) {
            throw "gateway port 18789 is not listening after ${totalWaitSec}s"
          }

      - name: Probe Gateway HTTP
        shell: pwsh
        run: |
          try {
            $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18789/' -TimeoutSec 10 -UseBasicParsing
            Write-Host "Gateway HTTP status: $($r.StatusCode)"
          } catch {
            # 404 / unauthorised are fine — we only care that something is serving
            Write-Host "Gateway HTTP probe (non-2xx is OK for smoke): $_"
          }

      - name: Capture diagnostics
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Processes (MyClaw/openclaw/node) ==="
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw|node" } | Format-Table Id, ProcessName, CPU, WS

          Write-Host "`n=== Command lines ==="
          try {
            Get-CimInstance Win32_Process | Where-Object { $_.Name -match "MyClaw|openclaw|node" } | ForEach-Object {
              Write-Host "PID $($_.ProcessId) [$($_.Name)]"
              Write-Host "  $($_.CommandLine)"
            }
          } catch { Write-Host "CIM query failed: $_" }

          Write-Host "`n=== TCP listeners near 18789 ==="
          Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue |
            Where-Object { $_.LocalPort -ge 18000 -and $_.LocalPort -le 19999 } |
            Format-Table LocalAddress, LocalPort, OwningProcess

          # Electron uses package.json name (myclaw-desktop), not productName
          $candidates = @(
            "$env:APPDATA\myclaw-desktop\logs",
            "$env:APPDATA\myclaw-desktop",
            "$env:LOCALAPPDATA\myclaw-desktop\logs",
            "$env:APPDATA\MyClaw.One\logs",
            "$env:USERPROFILE\.openclaw\logs",
            "$env:USERPROFILE\.openclaw"
          )
          foreach ($dir in $candidates) {
            if (Test-Path $dir) {
              Write-Host "`n=== Log dir: $dir ==="
              Get-ChildItem $dir -Recurse -ErrorAction SilentlyContinue | Select-Object -First 30 |
                Format-Table FullName, Length
              $latestMyclaw = Get-ChildItem $dir -Filter "myclaw-*.log" -Recurse -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending | Select-Object -First 1
              if ($latestMyclaw) {
                Write-Host "`n=== Tail of $($latestMyclaw.FullName) ==="
                Get-Content $latestMyclaw.FullName -Tail 300
              }
            }
          }

          $openclawJson = "$env:USERPROFILE\.openclaw\openclaw.json"
          if (Test-Path $openclawJson) {
            Write-Host "`n=== $openclawJson ==="
            Get-Content $openclawJson
          }

      - name: Stage logs for upload
        if: always()
        shell: pwsh
        run: |
          $stage = "$env:GITHUB_WORKSPACE\install-smoke-logs"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $sources = @(
            "$env:APPDATA\myclaw-desktop\logs",
            "$env:LOCALAPPDATA\myclaw-desktop\logs",
            "$env:USERPROFILE\.openclaw\logs",
            "$env:USERPROFILE\.openclaw\openclaw.json",
            "$env:USERPROFILE\.openclaw\openclaw.json.bak"
          )
          foreach ($src in $sources) {
            if (Test-Path $src) {
              $name = ($src -replace '[:\\]','_')
              Copy-Item -Recurse -Force -Path $src -Destination "$stage\$name" -ErrorAction SilentlyContinue
              Write-Host "Staged: $src -> $stage\$name"
            }
          }
          Get-ChildItem $stage -Recurse | Format-Table FullName, Length

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-logs-${{ github.run_id }}
          path: install-smoke-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Stop MyClaw processes
        if: always()
        shell: pwsh
        run: |
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw" } | ForEach-Object {
            try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Start-Sleep -Seconds 3

      - name: Default silent uninstall
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found in $installDir" }
          Write-Host "Running: $($uninstaller.FullName) /S"
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "default uninstaller exit $($p.ExitCode)" }

      - name: Assert canary survived default silent uninstall
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (-not (Test-Path $canary)) {
            throw "REGRESSION: default silent uninstall wiped $canary — must require /REMOVE_OPENCLAW"
          }
          Write-Host "OK: canary survived default silent uninstall"

      - name: Re-seed canary for /FORCE_REINSTALL_OPENCLAW test
        shell: pwsh
        run: |
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          Set-Content -Path (Join-Path $openclaw "canary.txt") -Value "canary-force-reinstall" -Encoding utf8

      - name: Install with /S /FORCE_REINSTALL_OPENCLAW
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          Write-Host "Installing with /FORCE_REINSTALL_OPENCLAW: $installer"
          $p = Start-Process -FilePath $installer -ArgumentList '/S','/FORCE_REINSTALL_OPENCLAW' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "force-reinstall installer exit $($p.ExitCode)" }

      - name: Assert canary wiped by /FORCE_REINSTALL_OPENCLAW
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (Test-Path $canary) {
            throw "BUG: /FORCE_REINSTALL_OPENCLAW install did NOT wipe $canary"
          }
          Write-Host "OK: /FORCE_REINSTALL_OPENCLAW wiped .openclaw before install"

      - name: Uninstall (cleanup between opt-in tests)
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found for cleanup" }
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "cleanup uninstaller exit $($p.ExitCode)" }

      - name: Re-install (to exercise /REMOVE_OPENCLAW uninstall)
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          $p = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "reinstall exit $($p.ExitCode)" }

      - name: Re-seed canary for /REMOVE_OPENCLAW test
        shell: pwsh
        run: |
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          Set-Content -Path (Join-Path $openclaw "canary.txt") -Value "canary-remove-openclaw" -Encoding utf8

      - name: Uninstall with /S /REMOVE_OPENCLAW
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found for /REMOVE_OPENCLAW test" }
          Write-Host "Running: $($uninstaller.FullName) /S /REMOVE_OPENCLAW"
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S','/REMOVE_OPENCLAW' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "/REMOVE_OPENCLAW uninstaller exit $($p.ExitCode)" }

      - name: Assert canary wiped by /REMOVE_OPENCLAW
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (Test-Path $canary) {
            throw "BUG: /REMOVE_OPENCLAW uninstall did NOT wipe $canary"
          }
          Write-Host "OK: /REMOVE_OPENCLAW wiped .openclaw"

      - name: Final cleanup (best-effort)
        if: always()
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          if (-not $installDir -or -not (Test-Path $installDir)) {
            Write-Host "Nothing to uninstall"
            return
          }
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $uninstaller) {
            Write-Host "Uninstaller not found in $installDir"
            return
          }
          Write-Host "Final cleanup: $($uninstaller.FullName) /S"
          Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -NoNewWindow
