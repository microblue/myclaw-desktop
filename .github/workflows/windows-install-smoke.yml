name: Windows Install Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'scripts/**'
      - 'electron-builder.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/windows-install-smoke.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  install-smoke:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binaries for Windows
        run: pnpm run uv:download:win

      - name: Build Windows package
        run: pnpm run package:win

      - name: Locate installer
        id: locate
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "MyClaw.One-*-win-*.exe" -File | Select-Object -First 1
          if (-not $installer) {
            Get-ChildItem release | Format-Table Name, Length
            throw "installer .exe not found under release/"
          }
          Write-Host "Found installer: $($installer.FullName)"
          "installer=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Seed .openclaw canary (regression guard for default path)
        shell: pwsh
        run: |
          # A canary in $env:USERPROFILE\.openclaw lets us detect if the default
          # silent install/uninstall ever wipes user data (it must not).
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          $canary = Join-Path $openclaw "canary.txt"
          Set-Content -Path $canary -Value "canary-default-$(Get-Date -Format o)" -Encoding utf8
          Write-Host "Seeded canary: $canary"

      - name: Silent install
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          Write-Host "Installing: $installer"
          $p = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          Write-Host "Installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "installer returned non-zero exit code" }

      - name: Assert canary survived default silent install
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (-not (Test-Path $canary)) {
            throw "REGRESSION: default silent install wiped $canary — auto-updates must preserve user data"
          }
          Write-Host "OK: canary survived default silent install"

      - name: Layer 1 — verify Electron shell install
        # The NSIS installer completed; confirm it actually deposited
        # MyClaw.One.exe where Program Files expects it.
        id: install-path
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\MyClaw.One\MyClaw.One.exe",
            "C:\Program Files (x86)\MyClaw.One\MyClaw.One.exe"
          )
          $exe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Expected install paths missing; listing Program Files:"
            Get-ChildItem "C:\Program Files" -Filter "MyClaw*" -ErrorAction SilentlyContinue | Format-Table
            throw "LAYER 1 FAIL: installed MyClaw.One.exe not found"
          }
          Write-Host "LAYER 1 OK: $exe"
          "exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $installDir = Split-Path $exe -Parent
          "dir=$installDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-ChildItem $installDir | Format-Table Name, Length

      # ── Layer 2: bundled runtime toolchain ──────────────────────────────────
      # Split into 2a/2b/2c/2d so a failure pinpoints the exact step.

      - name: Layer 2a — bundled node.exe present
        id: layer2a
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $bundledNode = Join-Path $installDir "resources\bin\node.exe"

          Write-Host "=== Bundled binaries tree (first 40) ==="
          Get-ChildItem (Join-Path $installDir "resources\bin") -Recurse -Depth 2 -ErrorAction SilentlyContinue |
            Select-Object -First 40 | Format-Table FullName, Length

          if (-not (Test-Path $bundledNode)) { throw "LAYER 2a FAIL: node.exe missing at $bundledNode" }
          "node=$bundledNode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "LAYER 2a OK: $bundledNode"

      - name: Layer 2b — bundled node.exe runs
        shell: pwsh
        run: |
          $node = "${{ steps.layer2a.outputs.node }}"
          $v = & $node --version
          if ($LASTEXITCODE -ne 0) { throw "LAYER 2b FAIL: node --version exited $LASTEXITCODE" }
          Write-Host "LAYER 2b OK: node $v"

      - name: Layer 2c — bundled npm-cli.js present
        id: layer2c
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $bundledNpm = Join-Path $installDir "resources\bin\node_modules\npm\bin\npm-cli.js"
          if (-not (Test-Path $bundledNpm)) {
            Write-Host "=== Full resources\bin tree (for diagnosis) ==="
            Get-ChildItem (Join-Path $installDir "resources\bin") -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 80 | Format-Table FullName, Length
            throw "LAYER 2c FAIL: npm-cli.js missing at $bundledNpm (is after-pack.cjs copying node_modules?)"
          }
          "npm=$bundledNpm" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "LAYER 2c OK: $bundledNpm"

      - name: Layer 2d — bundled npm runs via bundled node
        shell: pwsh
        run: |
          $node = "${{ steps.layer2a.outputs.node }}"
          $npm = "${{ steps.layer2c.outputs.npm }}"
          $v = & $node $npm --version
          if ($LASTEXITCODE -ne 0) { throw "LAYER 2d FAIL: node npm-cli.js --version exited $LASTEXITCODE" }
          Write-Host "LAYER 2d OK: npm $v"

      # ── Layer 3: MyClaw runtime can be installed via bundled toolchain ───────
      # Split into 3a/3b so we know whether openclaw itself or the preinstalled
      # plugins are the blocker.  Both use the exact flag set MyClaw's runtime
      # init uses.

      - name: Layer 3 — install openclaw + preinstalled_plugins (single npm invocation)
        # MONOLITHIC install mirroring exactly what ensure_myclaw_runtime_installed
        # does at MyClaw's first-launch.  Previously this was split into 3a
        # (openclaw alone) + 3b (plugins after) — but npm prunes "extraneous"
        # packages on each `install` invocation and the plugins declare
        # openclaw as peerDependencies only, not dependencies, so the 3b step
        # kept deleting openclaw.  Production code avoids this by listing
        # everything in a single argv; this layer now matches that shape.
        id: layer3
        shell: pwsh
        run: |
          $node = "${{ steps.layer2a.outputs.node }}"
          $npm  = "${{ steps.layer2c.outputs.npm }}"

          $pkg = Get-Content "$env:GITHUB_WORKSPACE\package.json" -Raw | ConvertFrom-Json
          $openclawVersion = $pkg.available_backends.openclaw.version
          $plugins = $pkg.available_backends.openclaw.preinstalled_plugins

          $specs = @("openclaw@$openclawVersion")
          if ($plugins) {
            $plugins.PSObject.Properties | ForEach-Object {
              $specs += "$($_.Name)@$($_.Value)"
            }
          }
          Write-Host "Install specs: $($specs -join ', ')"

          $prefix = "C:\TEMP\layer3-verify"
          if (Test-Path $prefix) { Remove-Item -Recurse -Force $prefix }
          New-Item -ItemType Directory -Force -Path $prefix | Out-Null

          $log = Join-Path $prefix "install.log"
          $args = @($npm, 'install') + $specs + @(
            '--prefix', $prefix,
            '--no-save', '--package-lock=false',
            '--legacy-peer-deps', '--omit=dev'
          )
          Write-Host "Running: $node $($args -join ' ')"
          & $node @args 2>&1 | Tee-Object -FilePath $log
          $rc = $LASTEXITCODE

          Write-Host ""
          Write-Host "=== install.log tail (last 80 lines) ==="
          Get-Content $log -Tail 80 -ErrorAction SilentlyContinue

          if ($rc -ne 0) {
            throw "LAYER 3 FAIL: monolithic npm install exited $rc"
          }

          # Assert openclaw landed
          $openclawPkg = Join-Path $prefix "node_modules\openclaw\package.json"
          if (-not (Test-Path $openclawPkg)) {
            throw "LAYER 3 FAIL: openclaw/package.json absent after install"
          }
          $installedVer = (Get-Content $openclawPkg -Raw | ConvertFrom-Json).version

          # Assert each plugin landed
          if ($plugins) {
            foreach ($p in $plugins.PSObject.Properties.Name) {
              $pathParts = $p -split '/'
              $installed = Join-Path $prefix ("node_modules\" + ($pathParts -join '\') + "\package.json")
              if (-not (Test-Path $installed)) {
                throw "LAYER 3 FAIL: plugin ${p} did not land at ${installed}"
              }
            }
            Write-Host "LAYER 3 OK: openclaw $installedVer + $($plugins.PSObject.Properties.Count) plugin(s) co-installed"
          } else {
            Write-Host "LAYER 3 OK: openclaw $installedVer installed (no preinstalled_plugins declared)"
          }

          "runtime=$prefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "openclaw_version=$installedVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Layer 3.5: pre-warm bundled plugin runtime deps ─────────────────────
      # Openclaw's startup plugins (acpx/browser/device-pair/phone-control/
      # talk-voice) each declare their own `dependencies` in
      # `dist/extensions/<plugin>/package.json`.  At gateway boot,
      # `ensureBundledPluginRuntimeDeps` (bundled-runtime-deps-*.js:495)
      # calls `spawnSync('npm install ...')` synchronously for any plugin
      # whose node_modules are missing.  On Linux that completes in ~2-3s
      # total.  On Windows CI it hangs silently, kills gateway boot in the
      # dark window between "auth token saved" and "canvas host mounted",
      # with no error surfaced because the install error goes through
      # pushPluginLoadError + stdio:'pipe' captures output in memory.
      #
      # We pre-install those startup-plugin deps here so the gateway sees
      # an already-populated tree and skips spawnSync entirely.  Only the
      # 5 always-loaded startup plugins are warmed; rarer plugins install
      # lazily the first time they're enabled.

      - name: Layer 3.5 — pre-warm bundled plugin runtime deps
        shell: pwsh
        run: |
          $node    = "${{ steps.layer2a.outputs.node }}"
          $npm     = "${{ steps.layer2c.outputs.npm }}"
          $runtime = "${{ steps.layer3.outputs.runtime }}"

          # Exactly the plugins Linux's first boot logged loading when
          # given an empty config + scratch state dir:
          #   [gateway] ready (5 plugins: acpx, browser, device-pair,
          #   phone-control, talk-voice; 3.1s)
          $startupPlugins = @('acpx', 'browser', 'device-pair', 'phone-control', 'talk-voice')

          foreach ($plugin in $startupPlugins) {
            $pluginDir = Join-Path $runtime "node_modules\openclaw\dist\extensions\$plugin"
            $pkgPath   = Join-Path $pluginDir "package.json"
            if (-not (Test-Path $pkgPath)) {
              Write-Host "skip $plugin — package.json missing (plugin may have been renamed in this openclaw version)"
              continue
            }

            $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
            $deps = @()
            if ($pkg.PSObject.Properties['dependencies']) {
              $pkg.dependencies.PSObject.Properties | ForEach-Object {
                $deps += "$($_.Name)@$($_.Value)"
              }
            }

            if ($deps.Count -eq 0) {
              Write-Host "skip $plugin — no dependencies"
              continue
            }

            Write-Host "warming $plugin ($($deps.Count) deps): $($deps -join ', ')"
            # Mirror the exact flag shape openclaw's own install uses
            # (bundled-runtime-deps-*.js:270 createBundledRuntimeDepsInstallArgs):
            #   install --ignore-scripts + env legacy-peer-deps=true, package-lock=false, save=false
            $installArgs = @($npm, 'install') + $deps + @(
              '--prefix', $pluginDir,
              '--ignore-scripts',
              '--no-save', '--package-lock=false',
              '--legacy-peer-deps', '--omit=dev'
            )
            & $node @installArgs 2>&1 | Out-Host
            if ($LASTEXITCODE -ne 0) {
              throw "LAYER 3.5 FAIL: npm install for plugin $plugin exited $LASTEXITCODE"
            }
          }
          Write-Host "LAYER 3.5 OK: pre-warmed startup plugin runtime deps"

      # ── Layer 4: openclaw gateway starts from the scratch runtime ────────────

      - name: Layer 4a — openclaw.mjs entry exists
        id: layer4a
        shell: pwsh
        run: |
          $runtime = "${{ steps.layer3.outputs.runtime }}"
          $openclawDir = Join-Path $runtime "node_modules\openclaw"
          $entry = Join-Path $openclawDir "openclaw.mjs"

          Write-Host "=== Contents of $openclawDir ==="
          if (Test-Path $openclawDir) {
            Get-ChildItem $openclawDir -Force -ErrorAction SilentlyContinue |
              Format-Table Name, Length, LastWriteTime
          } else {
            Write-Host "(directory missing entirely)"
            Write-Host ""
            Write-Host "=== Contents of $runtime\node_modules (first 40) ==="
            Get-ChildItem (Join-Path $runtime "node_modules") -Force -ErrorAction SilentlyContinue |
              Select-Object -First 40 | Format-Table Name, Length
          }

          if (-not (Test-Path $entry)) {
            Write-Host ""
            Write-Host "=== package.json of openclaw (if present) ==="
            $pkgPath = Join-Path $openclawDir "package.json"
            if (Test-Path $pkgPath) {
              Write-Host "bin field:"
              (Get-Content $pkgPath -Raw | ConvertFrom-Json).bin | Format-List
              Write-Host "main field:"
              (Get-Content $pkgPath -Raw | ConvertFrom-Json).main
              Write-Host "files field (first 15):"
              (Get-Content $pkgPath -Raw | ConvertFrom-Json).files | Select-Object -First 15
            }
            throw "LAYER 4a FAIL: $entry not found"
          }
          "entry=$entry" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "LAYER 4a OK: $entry"

      - name: Layer 4a.5 — write minimal openclaw.json (direct, no onboard spawn)
        # npm install only places openclaw's files on disk — it does NOT
        # produce an ~/.openclaw/openclaw.json.  Production MyClaw's
        # ensure_openclaw_onboarded writes `{gateway:{mode:'local'}}`
        # directly (openclaw's runtime defaults fill the rest).  We
        # abandoned spawning `openclaw onboard` because its non-interactive
        # mode hung indefinitely waiting on a state machine that couldn't
        # be satisfied from argv alone.  Layer 4a.5 now mirrors the
        # production direct-write path exactly.
        id: layer4_setup
        shell: pwsh
        run: |
          $runtime = "${{ steps.layer3.outputs.runtime }}"

          # Isolate state entirely under scratch prefix.  Gateway in
          # Layer 4b will honour OPENCLAW_STATE_DIR, keeping the test
          # out of the runner's real ~/.openclaw/ and out of whatever
          # residue openclaw's postinstall left there during Layer 3.
          $stateDir = Join-Path $runtime "openclaw-state"
          if (Test-Path $stateDir) { Remove-Item -Recurse -Force $stateDir }
          New-Item -ItemType Directory -Force -Path $stateDir | Out-Null

          $configPath = Join-Path $stateDir "openclaw.json"
          $minimal = '{' + "`n" + '  "gateway": {' + "`n" + '    "mode": "local"' + "`n" + '  }' + "`n" + '}' + "`n"
          Set-Content -Path $configPath -Value $minimal -Encoding utf8 -NoNewline
          Write-Host "Wrote minimal config to $configPath"
          Get-Content $configPath

          if (-not (Test-Path $configPath)) {
            throw "LAYER 4a.5 FAIL: $configPath not created"
          }
          Write-Host "LAYER 4a.5 OK: minimal config written (gateway.mode=local)"
          "state_dir=$stateDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── Layer 4b+4c MERGED ───────────────────────────────────────────────────
      # Previously split into 4b (spawn + alive) and 4c (bind + diagnostics).
      # The split caused a Windows-specific failure: the spawned gateway
      # process appears to be caught in the CI runner's step-scoped Job
      # Object, so when Layer 4b's pwsh session exits the gateway is
      # cascade-killed via TerminateProcess — which bypasses all Node
      # exit handlers (no EXIT, no BEFORE_EXIT, no signal, no
      # process.exit caller).  The exit-trace preload confirmed this:
      # "[exit-trace] preload installed, pid=X" printed, but no exit
      # event for either the gateway or its config-writer child.
      # Merging spawn + wait into one step keeps the gateway in the
      # same Job Object until we're done observing it.

      - name: Layer 4 — gateway spawn + bind 18789 within 180s
        id: layer4
        shell: pwsh
        run: |
          $node = "${{ steps.layer2a.outputs.node }}"
          $entry = "${{ steps.layer4a.outputs.entry }}"
          $runtime = "${{ steps.layer3.outputs.runtime }}"
          $stateDir = "${{ steps.layer4_setup.outputs.state_dir }}"

          $env:OPENCLAW_STATE_DIR = $stateDir

          $preload = Join-Path $env:GITHUB_WORKSPACE ".github\workflows\exit-trace.cjs"
          if (-not (Test-Path $preload)) {
            throw "exit-trace preload missing at $preload"
          }

          $stdoutLog = Join-Path $runtime "gateway-stdout.log"
          $stderrLog = Join-Path $runtime "gateway-stderr.log"

          Write-Host "Spawning: $node --require $preload $entry gateway run --verbose"
          Write-Host "  OPENCLAW_STATE_DIR=$stateDir"
          $gw = Start-Process -FilePath $node `
                              -ArgumentList '--require', $preload, $entry, 'gateway', 'run', '--verbose' `
                              -PassThru `
                              -RedirectStandardOutput $stdoutLog `
                              -RedirectStandardError $stderrLog `
                              -WorkingDirectory $runtime
          $gwPid = $gw.Id
          Write-Host "Gateway spawned: pid=$gwPid"

          # Single wait loop — poll every 3s for either (a) the port
          # coming up or (b) the process dying.  Whichever happens
          # first wins.  Hard cap at 180s.  Staying in this pwsh
          # session keeps the gateway inside the step's Job Object
          # for the entire observation window.
          $deadline = (Get-Date).AddSeconds(180)
          $listening = $false
          $exitCode = $null
          while ((Get-Date) -lt $deadline) {
            if ($gw.HasExited) {
              $exitCode = $gw.ExitCode
              Write-Host "Gateway PID $gwPid died; exit code: $exitCode"
              break
            }
            $conn = Get-NetTCPConnection -LocalPort 18789 -State Listen -ErrorAction SilentlyContinue
            if ($conn) {
              $elapsed = [int](180 - (($deadline - (Get-Date)).TotalSeconds))
              Write-Host "LAYER 4 OK: 18789 listening after ${elapsed}s (pid=$($conn[0].OwningProcess))"
              $listening = $true
              break
            }
            Start-Sleep -Seconds 3
          }

          Write-Host ""
          Write-Host "=== gateway-stdout.log (full) ==="
          Get-Content $stdoutLog -ErrorAction SilentlyContinue
          Write-Host ""
          Write-Host "=== gateway-stderr.log (full) ==="
          Get-Content $stderrLog -ErrorAction SilentlyContinue

          Write-Host ""
          Write-Host "=== $stateDir contents ==="
          if (Test-Path $stateDir) {
            Get-ChildItem $stateDir -Recurse -Force -ErrorAction SilentlyContinue |
              Select-Object -First 40 | Format-Table FullName, Length
          } else {
            Write-Host "(state dir not created — openclaw never got that far?)"
          }

          foreach ($f in @('openclaw.json', 'openclaw.json.bak', 'logs\config-health.json', 'logs\config-audit.jsonl')) {
            $path = Join-Path $stateDir $f
            if (Test-Path $path) {
              Write-Host ""
              Write-Host "=== $path ==="
              Get-Content $path
            }
          }

          $logsDir = Join-Path $stateDir "logs"
          if (Test-Path $logsDir) {
            Get-ChildItem $logsDir -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '\.log$|gateway' } |
              ForEach-Object {
                Write-Host ""
                Write-Host "=== $($_.FullName) (tail 100) ==="
                Get-Content $_.FullName -Tail 100
              }
          }

          if (-not $gw.HasExited) {
            try { Stop-Process -Id $gwPid -Force -ErrorAction SilentlyContinue } catch {}
            Start-Sleep -Seconds 3
          }

          if (-not $listening) {
            throw "LAYER 4 FAIL: 18789 never listened (gateway exit code: $exitCode)"
          }
          "pid=$gwPid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── MERGED Launch + Wait + Probe ─────────────────────────────────────────
      # Previously three separate steps.  If Electron (or any child it
      # spawns) were in a CI step Job Object we'd lose them across step
      # boundaries — same pattern that killed Layer 4b's gateway.  Merge
      # into one step so the app + its spawned gateway stay inside the
      # same pwsh session's Job Object for the full observation window.
      # Also upgrades diagnostics: mid-wait status snapshots so we know
      # WHERE MyClaw is stuck when things go wrong (runtime install
      # running? config written? gateway spawn in progress?).

      - name: Launch MyClaw + wait for gateway 18789 + HTTP probe
        shell: pwsh
        run: |
          $exe = "${{ steps.install-path.outputs.exe }}"

          # Launch MyClaw via cmd.exe with stderr redirected to a file.
          # Prior --enable-logging=file attempt produced an empty log
          # (header printed, file created, zero bytes of content) —
          # suggesting Chromium either interpreted =file as "default
          # location" or bailed before writing.  Switch tack: redirect
          # the process's stdio directly via cmd /c > out 2>&1.  This
          # captures anything written to stdout/stderr by the Electron
          # binary from the moment it starts, including pre-Chromium
          # init errors.  --no-sandbox removes a layer that's sometimes
          # problematic on CI runners.  --enable-logging=stderr (no
          # =file) redirects Chromium logs through stderr.
          $outLog = Join-Path $env:USERPROFILE "myclaw-out.log"
          $errLog = Join-Path $env:USERPROFILE "myclaw-err.log"
          if (Test-Path $outLog) { Remove-Item $outLog -Force }
          if (Test-Path $errLog) { Remove-Item $errLog -Force }

          $cmdArg = '"' + $exe + '" --enable-logging=stderr --v=1 --no-sandbox > "' + $outLog + '" 2> "' + $errLog + '"'
          Write-Host "Launching via cmd: $cmdArg"
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c", $cmdArg
          Start-Sleep -Seconds 5

          $myclaw = Get-Process -Name "MyClaw.One" -ErrorAction SilentlyContinue
          if (-not $myclaw) { throw "MyClaw.One process did not launch" }
          Write-Host "MyClaw PID: $($myclaw[0].Id)"

          # Candidate paths where MyClaw writes files during init.  These
          # act as milestones: if <userProfile>\.myclaw\runtime\node_modules
          # \openclaw\ appears, Step 1 (runtime install) completed.  If
          # <userProfile>\.openclaw\openclaw.json appears, Step 2 (onboard)
          # completed.  If port 18789 listens, gateway auto-start succeeded.
          $runtimeNM = Join-Path $env:USERPROFILE ".myclaw\runtime\node_modules\openclaw\package.json"
          $openclawCfg = Join-Path $env:USERPROFILE ".openclaw\openclaw.json"
          # Electron userData defaults to %APPDATA%\<productName>; productName is MyClaw.One
          $appLogs = Join-Path $env:APPDATA "MyClaw.One\logs"

          $totalWaitSec = 900
          $start = Get-Date
          $deadline = $start.AddSeconds($totalWaitSec)
          $found = $false
          $lastSnapshot = Get-Date

          while ((Get-Date) -lt $deadline) {
            $conn = Get-NetTCPConnection -LocalPort 18789 -State Listen -ErrorAction SilentlyContinue
            if ($conn) {
              $elapsed = [int]((Get-Date) - $start).TotalSeconds
              Write-Host "Gateway listening on 18789 (PID $($conn[0].OwningProcess)) after ${elapsed}s"
              $found = $true
              break
            }

            # Every 30s: print milestone snapshot so we know where MyClaw is
            if (((Get-Date) - $lastSnapshot).TotalSeconds -ge 30) {
              $lastSnapshot = Get-Date
              $elapsed = [int]((Get-Date) - $start).TotalSeconds
              $procs = Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw|node|npm" } |
                       Select-Object Id, ProcessName, CPU
              $stage = @(
                "[${elapsed}s] MyClaw alive=$(if (Get-Process -Id $myclaw[0].Id -EA SilentlyContinue) {'yes'} else {'NO'})",
                "runtime_installed=$(Test-Path $runtimeNM)",
                "openclaw_onboarded=$(Test-Path $openclawCfg)",
                "myclaw_logs_dir=$(Test-Path $appLogs)",
                "procs=$(($procs.ProcessName -join ',') -replace '^$','<none>')"
              ) -join '; '
              Write-Host $stage
            }

            Start-Sleep -Seconds 3
          }

          # Always dump final state before pass/fail verdict
          Write-Host ""
          Write-Host "=== Final processes ==="
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw|node|npm" } |
            Format-Table Id, ProcessName, CPU, StartTime

          Write-Host ""
          Write-Host "=== ~\.myclaw\runtime tree (first 30) ==="
          $myclawRuntime = Join-Path $env:USERPROFILE ".myclaw\runtime"
          if (Test-Path $myclawRuntime) {
            Get-ChildItem $myclawRuntime -Recurse -Depth 3 -Force -EA SilentlyContinue |
              Select-Object -First 30 | Format-Table FullName, Length
          } else {
            Write-Host "(not present — Step 1 ensure_myclaw_runtime_installed never wrote here)"
          }

          Write-Host ""
          Write-Host "=== ~\.openclaw tree (first 30) ==="
          $homeOpenclaw = Join-Path $env:USERPROFILE ".openclaw"
          if (Test-Path $homeOpenclaw) {
            Get-ChildItem $homeOpenclaw -Recurse -Depth 3 -Force -EA SilentlyContinue |
              Select-Object -First 30 | Format-Table FullName, Length
          }

          Write-Host ""
          Write-Host "=== %APPDATA%\MyClaw.One tree (first 30) ==="
          $userData = Join-Path $env:APPDATA "MyClaw.One"
          if (Test-Path $userData) {
            Get-ChildItem $userData -Recurse -Depth 3 -Force -EA SilentlyContinue |
              Select-Object -First 30 | Format-Table FullName, Length
          } else {
            Write-Host "(userData dir missing — Electron never wrote here)"
          }

          # Tail MyClaw log(s) if any
          foreach ($dir in @($appLogs, (Join-Path $env:APPDATA "myclaw-desktop\logs"), (Join-Path $env:LOCALAPPDATA "MyClaw.One\logs"))) {
            if (Test-Path $dir) {
              $latest = Get-ChildItem $dir -Filter "*.log" -File -EA SilentlyContinue |
                        Sort-Object LastWriteTime -Descending | Select-Object -First 1
              if ($latest) {
                Write-Host ""
                Write-Host "=== Tail of $($latest.FullName) ==="
                Get-Content $latest.FullName -Tail 200
              }
            }
          }

          # stdout + stderr captured via cmd /c > out 2> err
          foreach ($label in @('stdout', 'stderr')) {
            $path = if ($label -eq 'stdout') { $outLog } else { $errLog }
            Write-Host ""
            Write-Host "=== MyClaw $label at $path ==="
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              Write-Host "  size: $size bytes"
              Get-Content $path
            } else {
              Write-Host "  (file not created)"
            }
          }

          if (-not $found) {
            throw "gateway port 18789 is not listening after ${totalWaitSec}s"
          }

          # HTTP probe — folded in so we don't cross another step boundary
          try {
            $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18789/' -TimeoutSec 10 -UseBasicParsing
            Write-Host "Gateway HTTP status: $($r.StatusCode)"
          } catch {
            Write-Host "Gateway HTTP probe (non-2xx is OK for smoke): $_"
          }

      - name: Stop MyClaw before Playwright (single-instance lock)
        shell: pwsh
        run: |
          # Playwright's electron.launch() needs an unclaimed single-instance
          # lock.  Kill the manually-launched MyClaw before Playwright spawns
          # its own instance.  Subsequent first-window will be fast because
          # runtime/node_modules is already populated from the sanity launch.
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw" } | ForEach-Object {
            try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Start-Sleep -Seconds 5

      - name: Post-install E2E (user journey via Playwright)
        # Full user journey on top of the already-verified binary:
        #   - Launch MyClaw.One.exe via Playwright Electron
        #   - Skip setup wizard, seed OpenRouter + Google Flash Lite via IPC
        #   - Start Gateway, send chat, assert LLM response
        #   - Configure WeCom channel → triggers
        #     `openclaw plugins install @wecom/wecom-openclaw-plugin`
        #   - Assert channel install succeeded
        #
        # Auto-skips when OPENROUTER_TEST_API_KEY is absent; the preceding
        # sanity check already covered "binary boots, gateway serves".
        shell: pwsh
        env:
          MYCLAW_INSTALLED_EXE: ${{ steps.install-path.outputs.exe }}
          OPENROUTER_TEST_API_KEY: ${{ secrets.OPENROUTER_TEST_API_KEY }}
        run: |
          pnpm exec playwright test tests/e2e/post-install.spec.ts --reporter=list

      - name: Capture diagnostics
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Processes (MyClaw/openclaw/node) ==="
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw|node" } | Format-Table Id, ProcessName, CPU, WS

          Write-Host "`n=== Command lines ==="
          try {
            Get-CimInstance Win32_Process | Where-Object { $_.Name -match "MyClaw|openclaw|node" } | ForEach-Object {
              Write-Host "PID $($_.ProcessId) [$($_.Name)]"
              Write-Host "  $($_.CommandLine)"
            }
          } catch { Write-Host "CIM query failed: $_" }

          Write-Host "`n=== TCP listeners near 18789 ==="
          Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue |
            Where-Object { $_.LocalPort -ge 18000 -and $_.LocalPort -le 19999 } |
            Format-Table LocalAddress, LocalPort, OwningProcess

          # Electron uses package.json name (myclaw-desktop), not productName
          $candidates = @(
            "$env:APPDATA\myclaw-desktop\logs",
            "$env:APPDATA\myclaw-desktop",
            "$env:LOCALAPPDATA\myclaw-desktop\logs",
            "$env:APPDATA\MyClaw.One\logs",
            "$env:USERPROFILE\.openclaw\logs",
            "$env:USERPROFILE\.openclaw"
          )
          foreach ($dir in $candidates) {
            if (Test-Path $dir) {
              Write-Host "`n=== Log dir: $dir ==="
              Get-ChildItem $dir -Recurse -ErrorAction SilentlyContinue | Select-Object -First 30 |
                Format-Table FullName, Length
              $latestMyclaw = Get-ChildItem $dir -Filter "myclaw-*.log" -Recurse -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending | Select-Object -First 1
              if ($latestMyclaw) {
                Write-Host "`n=== Tail of $($latestMyclaw.FullName) ==="
                Get-Content $latestMyclaw.FullName -Tail 300
              }
            }
          }

          $openclawJson = "$env:USERPROFILE\.openclaw\openclaw.json"
          if (Test-Path $openclawJson) {
            Write-Host "`n=== $openclawJson ==="
            Get-Content $openclawJson
          }

      - name: Stage logs for upload
        if: always()
        shell: pwsh
        run: |
          $stage = "$env:GITHUB_WORKSPACE\install-smoke-logs"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $sources = @(
            "$env:APPDATA\myclaw-desktop\logs",
            "$env:LOCALAPPDATA\myclaw-desktop\logs",
            "$env:USERPROFILE\.openclaw\logs",
            "$env:USERPROFILE\.openclaw\openclaw.json",
            "$env:USERPROFILE\.openclaw\openclaw.json.bak"
          )
          foreach ($src in $sources) {
            if (Test-Path $src) {
              $name = ($src -replace '[:\\]','_')
              Copy-Item -Recurse -Force -Path $src -Destination "$stage\$name" -ErrorAction SilentlyContinue
              Write-Host "Staged: $src -> $stage\$name"
            }
          }
          Get-ChildItem $stage -Recurse | Format-Table FullName, Length

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke-logs-${{ github.run_id }}
          path: install-smoke-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Stop MyClaw processes
        if: always()
        shell: pwsh
        run: |
          Get-Process | Where-Object { $_.ProcessName -match "MyClaw|openclaw" } | ForEach-Object {
            try { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue } catch {}
          }
          Start-Sleep -Seconds 3

      - name: Default silent uninstall
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found in $installDir" }
          Write-Host "Running: $($uninstaller.FullName) /S"
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "default uninstaller exit $($p.ExitCode)" }

      - name: Assert canary survived default silent uninstall
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (-not (Test-Path $canary)) {
            throw "REGRESSION: default silent uninstall wiped $canary — must require /REMOVE_OPENCLAW"
          }
          Write-Host "OK: canary survived default silent uninstall"

      - name: Re-seed canary for /FORCE_REINSTALL_OPENCLAW test
        shell: pwsh
        run: |
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          Set-Content -Path (Join-Path $openclaw "canary.txt") -Value "canary-force-reinstall" -Encoding utf8

      - name: Install with /S /FORCE_REINSTALL_OPENCLAW
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          Write-Host "Installing with /FORCE_REINSTALL_OPENCLAW: $installer"
          $p = Start-Process -FilePath $installer -ArgumentList '/S','/FORCE_REINSTALL_OPENCLAW' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "force-reinstall installer exit $($p.ExitCode)" }

      - name: Assert canary wiped by /FORCE_REINSTALL_OPENCLAW
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (Test-Path $canary) {
            throw "BUG: /FORCE_REINSTALL_OPENCLAW install did NOT wipe $canary"
          }
          Write-Host "OK: /FORCE_REINSTALL_OPENCLAW wiped .openclaw before install"

      - name: Uninstall (cleanup between opt-in tests)
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found for cleanup" }
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "cleanup uninstaller exit $($p.ExitCode)" }

      - name: Re-install (to exercise /REMOVE_OPENCLAW uninstall)
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          $p = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "reinstall exit $($p.ExitCode)" }

      - name: Re-seed canary for /REMOVE_OPENCLAW test
        shell: pwsh
        run: |
          $openclaw = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Force -Path $openclaw | Out-Null
          Set-Content -Path (Join-Path $openclaw "canary.txt") -Value "canary-remove-openclaw" -Encoding utf8

      - name: Uninstall with /S /REMOVE_OPENCLAW
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File | Select-Object -First 1
          if (-not $uninstaller) { throw "Uninstaller not found for /REMOVE_OPENCLAW test" }
          Write-Host "Running: $($uninstaller.FullName) /S /REMOVE_OPENCLAW"
          $p = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S','/REMOVE_OPENCLAW' -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "/REMOVE_OPENCLAW uninstaller exit $($p.ExitCode)" }

      - name: Assert canary wiped by /REMOVE_OPENCLAW
        shell: pwsh
        run: |
          $canary = Join-Path $env:USERPROFILE ".openclaw\canary.txt"
          if (Test-Path $canary) {
            throw "BUG: /REMOVE_OPENCLAW uninstall did NOT wipe $canary"
          }
          Write-Host "OK: /REMOVE_OPENCLAW wiped .openclaw"

      - name: Final cleanup (best-effort)
        if: always()
        shell: pwsh
        run: |
          $installDir = "${{ steps.install-path.outputs.dir }}"
          if (-not $installDir -or -not (Test-Path $installDir)) {
            Write-Host "Nothing to uninstall"
            return
          }
          $uninstaller = Get-ChildItem $installDir -Filter "Uninstall*.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $uninstaller) {
            Write-Host "Uninstaller not found in $installDir"
            return
          }
          Write-Host "Final cleanup: $($uninstaller.FullName) /S"
          Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait -NoNewWindow
