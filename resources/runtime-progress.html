<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyClaw.One</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #1b1c2b 0%, #141520 100%);
      color: #e8e8ef;
      display: flex;
      flex-direction: column;
      padding: 32px 36px;
      user-select: none;
      -webkit-user-select: none;
    }
    .header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 22px; height: 22px; flex-shrink: 0;
      border: 2.5px solid rgba(255, 255, 255, 0.12);
      border-top-color: #6a8dff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
      margin: 0;
    }
    .subtitle {
      font-size: 12px; color: #8e8fa2;
      margin: 0 0 16px 0; line-height: 1.5;
    }
    #log {
      flex: 1; min-height: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10.5px; line-height: 1.45;
      color: #7a7d90;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log::-webkit-scrollbar { width: 8px; }
    #log::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="spinner"></div>
    <h1>Initializing your MyClaw runtime</h1>
  </div>
  <p class="subtitle">First launch can take up to a minute. Please keep the window open.</p>
  <pre id="log"></pre>
</body>
</html>
