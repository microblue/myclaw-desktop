<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyClaw.One</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #1b1c2b 0%, #141520 100%);
      color: #e8e8ef;
      display: flex;
      flex-direction: column;
      padding: 28px 32px 24px 32px;
      user-select: none;
      -webkit-user-select: none;
    }
    h1 {
      font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
      margin: 0 0 6px 0;
    }
    .subtitle {
      font-size: 12px; color: #8e8fa2;
      margin: 0; line-height: 1.5;
    }
    .progress {
      position: relative;
      width: 100%; height: 6px;
      margin: 18px 0 14px 0;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 35%;
      background: linear-gradient(90deg, #6a8dff 0%, #9b6aff 100%);
      border-radius: 3px;
      animation: slide 1.6s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { left: -35%; }
      100% { left: 100%; }
    }
    .stage {
      font-size: 11.5px; color: #b0b3c5;
      margin: 0 0 10px 0; line-height: 1.4;
      min-height: 16px;
    }
    #log {
      flex: 1; min-height: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10.5px; line-height: 1.45;
      color: #7a7d90;
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 12px 14px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #log::-webkit-scrollbar { width: 8px; }
    #log::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Initializing your MyClaw runtime</h1>
  <p class="subtitle">First launch can take up to a minute. Please keep the window open.</p>
  <div class="progress" aria-label="initializing"><div class="progress-bar"></div></div>
  <p class="stage" id="stage">Preparing…</p>
  <pre id="log"></pre>
</body>
</html>
